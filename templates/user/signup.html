<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - User Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0b1437; --card-bg: #ffffff; --text-main: #1b2559; --color-blue: #4318ff; --input-bg: #f4f7fe; --border-color: #e9edf7; }
        body { background-color: var(--bg-color); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .signup-card { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        h2 { color: var(--text-main); margin-bottom: 5px; font-weight: 800; }
        .sub-text { color: #8f9bba; margin-bottom: 25px; font-size: 13px; font-weight: 600; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; }
        input[type="text"], input[type="date"], input[type="email"], input[type="tel"], input[type="file"], select { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); box-sizing: border-box; font-weight: 600;
        }

        /* Radio Group Styling */
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .radio-option { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-main); cursor: pointer; }
        
        /* Referral Selection */
        .ref-selection { display: flex; gap: 20px; margin-bottom: 10px; }
        
        .btn-signup { width: 100%; padding: 15px; background: var(--color-blue); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-signup:hover { background: #3513cc; }
    </style>
</head>
<body>

<div class="signup-card">
    <h2>Create Your Account</h2>
    <p class="sub-text">Join with your referral and start your journey towards financial freedom.</p>
    
   <form id="signupForm">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="fullName" placeholder="Enter full name as per documents" required>
        </div>
        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" required>
        </div>
        
        <div class="form-group">
            <label>Sex</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="sex" value="male" checked> Male</label>
                <label class="radio-option"><input type="radio" name="sex" value="female"> Female</label>
                <label class="radio-option"><input type="radio" name="sex" value="others"> Others</label>
            </div>
        </div>

        <div class="form-group">
            <label>Aadhar Number</label>
            <input type="text" id="aadharNumber" placeholder="Enter 12 digit Aadhar number" maxlength="12">
        </div>
        <div class="form-group">
            <label>PAN Number</label>
            <input type="text" id="panNumber" placeholder="Enter 10 digit PAN number" maxlength="10">
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="mobileNumber" placeholder="Enter valid mobile number" maxlength="10">
        </div>
        <div class="form-group">
            <label>E Mail Id</label>
            <input type="email" id="emailId" placeholder="Enter valid email id" required>
        </div>

        <div class="form-group">
        <label>Referral Id</label>
        <div class="ref-selection">
            <label class="radio-option"><input type="radio" name="ref" value="yes" onchange="toggleRef(true)" checked> Referral Id</label>
            <label class="radio-option"><input type="radio" name="ref" value="no" onchange="toggleRef(false)"> No Referral Id</label>
        </div>
            <input type="text" id="refInput" placeholder="Enter Referral ID (Optional)" value="{{ ref_code }}">
        </div>

        <div class="form-group">
            <label>Upload Aadhar Card</label>
            <input type="file" id="aadharFile" required>
        </div>
        <div class="form-group">
            <label>Upload PAN Card</label>
            <input type="file" id="panFile" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn-signup">SIGN UP</button>
    </form>
</div>

<script>
    // 0. Toggle the Referral Input Box
    function toggleRef(show) {
        const refInput = document.getElementById('refInput');
        refInput.style.display = show ? 'block' : 'none';
        if (!show) {
            refInput.value = ''; // Clear value if they select "No Referral"
            window.placementLeg = null; // Clear the leg just in case
        }
    }

    // 1. Auto-fill the form based on the URL when the page loads
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('ref');
        const leg = urlParams.get('leg');
        
        if (refId) {
            document.getElementById('refInput').value = refId;
            // Store the leg in a hidden variable inside Javascript
            window.placementLeg = leg; 
            
            // Ensure the 'yes' radio button is checked
            document.querySelector('input[name="ref"][value="yes"]').checked = true;
            // Lock the 'no' option so they can't bypass the leader's link
            document.querySelector('input[name="ref"][value="no"]').disabled = true;
            // Lock the input box so it can't be edited
            document.getElementById('refInput').readOnly = true;
            document.getElementById('refInput').style.backgroundColor = "#e9ecef"; // Grey out background
        }
    });

    // 2. Capture the form submission
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 🌟 FIX 1: VALIDATE PASSWORDS MATCH BEFORE SENDING 🌟
        const pass = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        
        if(pass !== confirm) {
            alert("Error: Passwords do not match! Please try again.");
            return; // Stops the form from submitting!
        }

        // Check if referral radio is 'yes' to grab the ref ID
        const hasReferral = document.querySelector('input[name="ref"]:checked').value === 'yes';

        // Build the data object cleanly using the new IDs
        const formData = {
            fullName: document.getElementById('fullName').value,
            dob: document.getElementById('dob').value,
            sex: document.querySelector('input[name="sex"]:checked').value,
            aadhar: document.getElementById('aadharNumber').value,
            pan: document.getElementById('panNumber').value,
            mobile: document.getElementById('mobileNumber').value,
            email: document.getElementById('emailId').value,
            password: pass, // 🌟 FIX 2: ACTUALLY SEND THE PASSWORD TO PYTHON 🌟
            
            sponsor_id: hasReferral ? document.getElementById('refInput').value : null,
            leg: window.placementLeg || null // Sends the leg from URL, or null if company auto-fill
        };

        // Send to Python API
        fetch('/api/signup',  {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                // 1. Show the success message
                alert("Registration Successful! You can now log in.");
                // 2. Bulletproof Redirect (Forces the browser to load the login page)
                setTimeout(function() {
                    window.location.replace("/login");
                }, 100); 
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Could not connect to the backend server. Make sure Python is running.");
        });
    });
</script>
</body>
</html>
